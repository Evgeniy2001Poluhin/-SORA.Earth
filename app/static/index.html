<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA.Earth AI Platform</title>
    <link rel="icon" href="/static/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #065f46, #0f766e); padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 28px; display: flex; align-items: center; gap: 12px; }
        .header h1 span { font-size: 32px; }
        .header .status { background: #10b981; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .card { background: #1e293b; border-radius: 16px; padding: 24px; border: 1px solid #334155; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #5eead4; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #5eead4; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #10b981, #0d9488); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
        .btn-secondary { background: #334155; color: #e2e8f0; margin-top: 8px; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; }
        .result-success { background: #065f46; border: 1px solid #10b981; }
        .result-fail { background: #7f1d1d; border: 1px solid #ef4444; }
        .result-box h3 { font-size: 20px; margin-bottom: 8px; }
        .result-box .prob { font-size: 36px; font-weight: 700; }
        .models-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
        .model-card { background: #0f172a; padding: 12px; border-radius: 8px; text-align: center; }
        .model-card .name { font-size: 11px; color: #94a3b8; }
        .model-card .value { font-size: 20px; font-weight: 700; color: #5eead4; margin-top: 4px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; text-align: center; }
        .stat .number { font-size: 32px; font-weight: 700; color: #5eead4; }
        .stat .label { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .history-table th, .history-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
        .history-table th { color: #94a3b8; font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #065f46; color: #10b981; }
        .badge-fail { background: #7f1d1d; color: #ef4444; }
        .chart-container { position: relative; height: 250px; margin-top: 12px; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 768px) { .grid, .stats-row { grid-template-columns: 1fr; } .models-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>🌍</span> SORA.Earth AI Platform</h1>
        <div class="status">● Online</div>
    </div>

    <div class="container">
        <div class="stats-row" id="stats">
            <div class="stat"><div class="number" id="stat-model</div><div class="label">ML Models</div></div>
            <div class="stat"><div class="number" id="stat-features">7</div><div class="label">Features</div></div>
            <div class="stat"><div class="number" id="stat-f1">0.78</div><div class="label">Best F1 Score</div></div>
            <div class="stat"><div class="number" id="stat-preds">—</div><div class="label">Predictions</div></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>🔮 Project Prediction</h2>
                <div class="form-group">
                    <label>Budget ($)</label>
                    <input type="number" id="budget" value="500000" min="0">
                </div>
                <div class="form-group">
                    <label>CO₂ Reduction (tons)</label>
                    <input type="number" id="co2" value="1200" min="0">
                </div>
          <div class="form-group">
                    <label>Social Impact (1-10)</label>
                    <input type="number" id="social" value="8" min="1" max="10" step="0.1">
                </div>
                <div class="form-group">
                    <label>Duration (months)</label>
                    <input type="number" id="duration" value="18" min="1">
                </div>
                <button class="btn btn-primary" onclick="predict()">🚀 Predict with Stacking Ensemble</button>
                <button class="btn btn-secondary" onclick="predictAll()">📊 Compare All Models</button>

                <div class="result-box" id="result">
                    <h3 id="result-title"></h3>
                    <div class="prob" id="result-prob"></div>
                    <div class="models-grid" id="models-dl"></div>
                </div>
            </div>

            <div class="card">
                <h2>📈 Model Comparison</h2>
                <div class="chart-container">
                    <canvas id="modelChart"></canvas>
                </div>
                <h2 style="margin-top:24px">🎯 SHAP Explanation</h2>
                <div class="chart-container">
                    <canvas id="shapChart"></canvas>
                </div>
        </div>

            <div class="card full-width">
                <h2>📋 Prediction History</h2>
                <button class="btn btn-secondary" onclick="loadHistory()" style="width:auto;padding:8px 16px;margin-bottom:12px">Refresh</button>
                <table class="history-table">
                    <thead><tr><th>Time</th><th>Budget</th><th>CO₂</th><th>Social</th><th>Duration</th><th>Result</th><th>Probability</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
let modelChart, shapChart;

async function predict() {
    const data = getFormData();
    const r = await fetch('/predict/stacking', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    const j = await r.json();
    const box = document.getElementById('result');
    box.style.display = 'block';
    box.className = 'result-box ' + (j.prediction === 1 ? 'result-success' : 'result-fail');
   ument.getElementById('result-title').textContent = j.prediction === 1 ? '✅ Project Likely Successful' : '❌ Project Likely Unsuccessful';
    document.getElementById('result-prob').textContent = (j.probability * 100).toFixed(1) + '%';
    
    const md = document.getElementById('models-detail');
    md.innerHTML = Object.entries(j.individual_probs).map(([k,v]) => 
        `<div class="model-card"><div class="name">${k}</div><div class="value">${(v*100).toFixed(1)}%</div></div>`
    ).join('');

    updateModelChart(j.individual_probs, j.probability);
    loadShap(data);
    loadHistory();
}

async function predictAll() {
    const data = getFormData();
    const endpoints = [
        {name:'RandomForest', url:'/evaluate'},
        {name:'Compare', url:'/predict/compare'},
        {name:'Neural Net', url:'/predict/neural'},
        {name:'Stacking', url:'/predict/stacking'}
    ];
    const results = await Promise.all(endpoints.map(e => 
        fetch(e.url, {method:'POST', headers:{'Content-Type':'applicn/json'}, body:JSON.stringify(data)}).then(r=>r.json())
    ));
    const box = document.getElementById('result');
    box.style.display = 'block';
    box.className = 'result-box result-success';
    document.getElementById('result-title').textContent = '📊 All Models Comparison';
    document.getElementById('result-prob').textContent = '';
    const md = document.getElementById('models-detail');
    md.innerHTML = results.map((r,i) => {
        const prob = r.probability || r.success_probability || '—';
        return `<div class="model-card"><div class="name">${endpoints[i].name}</div><div class="value">${typeof prob==='number'?(prob>1?prob:(prob*100).toFixed(1))+'%':prob}</div></div>`;
    }).join('');
}

async function loadShap(data) {
    const r = await fetch('/explain/shap', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const j = await r.json();
    if (shapChart) shapChart.destroy();
    const ctx = document.getElementById('shapChart').getContext('2
    const colors = j.shap_values.map(v => v >= 0 ? '#10b981' : '#ef4444');
    shapChart = new Chart(ctx, {
        type: 'bar', data: { labels: j.features, datasets: [{data: j.shap_values, backgroundColor: colors, borderRadius: 4}] },
        options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
            scales: { x:{ticks:{color:'#94a3b8'},grid:{color:'#1e293b'}}, y:{ticks:{color:'#e2e8f0'},grid:{display:false}} } }
    });
}

function updateModelChart(probs, stackProb) {
    if (modelChart) modelChart.destroy();
    const ctx = document.getElementById('modelChart').getContext('2d');
    const labels = [...Object.keys(probs), 'stacking'];
    const values = [...Object.values(probs), stackProb].map(v => (v*100).toFixed(1));
    modelChart = new Chart(ctx, {
        type: 'bar', data: { labels, datasets: [{data: values, backgroundColor: ['#0d9488','#8b5cf6','#f59e0b','#10b981'], borderRadius: 6}] },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
            scales: { y:{beginAtZero:true, max:100, ticks:{color:'#94a3b8',callback:v=>v+'%'}, grid:{color:'#1e293b'}}, x:{ticks:{color:'#e2e8f0'},grid:{display:false}} } }
    });
}

async function loadHistory() {
    const r = await fetch('/predictions/history?limit=20');
    const j = await r.json();
    document.getElementById('stat-preds').textContent = j.total;
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = j.predictions.reverse().map(p => `<tr>
        <td>${p.timestamp ? new Date(p.timestamp).toLocaleString('ru') : '—'}</td>
        <td>$${Number(p.budget||0).toLocaleString()}</td>
        <td>${p.co2_reduction||'—'}</td>
        <td>${p.social_impact||'—'}</td>
        <td>${p.duration_months||'—'} мес</td>
        <td><span class="badge ${p.prediction==1?'badge-success':'badge-fail'}">${p.prediction==1?'Success':'Fail'}</span></td>
        <td>${p.probability ? (p.probability*100).toFixed(1)+'%' : '—'}</td>
  n('');
}

function getFormData() {
    return {
        budget: +document.getElementById('budget').value,
        co2_reduction: +document.getElementById('co2').value,
        social_impact: +document.getElementById('social').value,
        duration_months: +document.getElementById('duration').value
    };
}

loadHistory();
</script>
</body>
</html>
