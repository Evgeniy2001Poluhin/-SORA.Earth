apiVersion: 1

groups:
  - orgId: 1
    name: SORA MLOps Alerts
    folder: SORA
    interval: 5m
    rules:
      - uid: sora-drift-detected
        title: Drift Detected
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(sora_drift_detected_total[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Data drift detected — consider retraining"

      - uid: sora-retrain-failed
        title: Retrain Failed
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(sora_model_rejected_total[10m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Model retrain was rejected (AUC degraded)"

      - uid: sora-auc-degradation
        title: AUC Below Threshold
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sora_model_auc < 0.85
              intervalMs: 1000
              maxDataPoints: 43200
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Model AUC dropped below 0.85"

      - uid: sora-high-latency
        title: High Prediction Latency
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, rate(sora_prediction_latency_ms_bucket[5m])) > 500
              intervalMs: 1000
              maxDataPoints: 43200
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P95 prediction latency exceeds 500ms"

      - uid: sora-app-down
        title: App Unreachable
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="sora-app"} == 0
              intervalMs: 1000
              maxDataPoints: 43200
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SORA app target is DOWN"
