apiVersion: apps/v1
kind: Deployment
metadata:
  name: sora-earth-api
  labels:
    app: sora-earth
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sora-earth
      component: api
  template:
    metadata:
      labels:
        app: sora-earth
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: sora-earth:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sora-earth-secrets
              key: jwt-secret
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: sora-earth-secrets
              key: sentry-dsn
              optional: true
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow:5000"
        - name: SORA_ENV
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sora-earth-api
  labels:
    app: sora-earth
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: sora-earth
    component: api
---
apiVersion: v1
kind: Secret
metadata:
  name: sora-earth-secrets
type: Opaque
stringData:
  jwt-secret: "sora-earth-secret-key-2026-change-in-production"
  sentry-dsn: ""
