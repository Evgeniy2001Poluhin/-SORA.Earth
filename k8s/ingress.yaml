apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sora-earth-ingress
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.sora.earth
    secretName: sora-earth-tls
  rules:
  - host: api.sora.earth
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sora-earth-api
            port:
              number: 8000
