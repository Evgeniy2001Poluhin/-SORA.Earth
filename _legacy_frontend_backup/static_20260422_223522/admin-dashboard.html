<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SORA.Earth Admin Dashboard</title>
  <style>
    :root{--bg:#0b1020;--panel:#121933;--panel-2:#182142;--text:#ecf1ff;--muted:#9fb0d3;--ok:#2ecc71;--warn:#f1c40f;--bad:#ff6b6b;--accent:#4da3ff;--border:rgba(255,255,255,0.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#0a0f1d,#10172d);color:var(--text);min-height:100vh}
    .wrap{max-width:1320px;margin:0 auto;padding:24px}
    h1,h2,h3,p{margin:0}
    .topbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:20px}
    .title p{color:var(--muted);margin-top:6px}
    .auth{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input{min-width:120px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:14px}
    button{padding:10px 18px;border:0;border-radius:10px;background:var(--accent);color:white;font-weight:600;cursor:pointer;font-size:14px;transition:opacity .15s}
    button:hover{opacity:.85}
    button:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
    .btn-warn{background:#e67e22}
    .btn-ok{background:#27ae60}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .card{background:rgba(18,25,51,0.92);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .card-full{grid-column:1/-1}
    .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
    .value{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
    .sub{margin-top:6px;color:var(--muted);font-size:13px}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.accent{color:var(--accent)}
    .row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .row:last-child{border-bottom:0}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
    .badge-ok{background:rgba(46,204,113,0.15);color:var(--ok)}
    .badge-bad{background:rgba(255,107,107,0.15);color:var(--bad)}
    .badge-warn{background:rgba(241,196,15,0.15);color:var(--warn)}
    .badge-accent{background:rgba(77,163,255,0.15);color:var(--accent)}
    .error{display:none;margin-bottom:16px;padding:14px;background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.35);color:#ffd5d5;border-radius:12px}
    .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .timeline-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .timeline-item:last-child{border-bottom:0}
    .timeline-time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:900px){.grid,.grid-3,.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">
      <h1>🌍 SORA.Earth Admin Dashboard</h1>
      <p>Operational overview — health, models, data refresh, retrain, drift, scheduler</p>
    </div>
    <div class="auth">
      <input id="user" type="text" placehnewer="Username" value="admin"/>
      <input id="pass" type="password" placehnewer="Password" value="sora2026"/>
      <button id="loadBtn">Load</button>
      <button id="autoBtn" class="btn-sm">Auto-refresh: OFF</button>
    </div>
  </div>
  <div id="errorBox" class="error"></div>
  <div id="lastUpdate" class="sub" style="margin-bottom:14px"></div>

  <section class="grid">
    <div class="card"><div class="label">Platform Health</div><div id="health" class="value">—</div><div id="healthSub" class="sub"></div></div>
    <div class="card"><div class="label">Last Refresh</div><div id="refreshStatus" class="value">—</div><div id="refreshSub" class="sub"></div></div>
    <div class="card"><div class="label">Last Retrain</div><div id="retrainStatus" class="value">—</div><div id="retrainSub" class="sub"></div></div>
    <div class="card"><div class="label">Drift</div><div id="driftStatus" class="value">—</div><div id="driftSub" class="sub"></div></div>
  </section>

  <section class="grid-2">
    <div class="card">
      <h2>Data Refresh</h2>
      <div id="refreshDetails"></div>
      <div class="actions">
        <button class="btn-sm btn-warn" id="triggerRefresh">⟳ Trigger Refresh</button>
      </div>
    </div>
    <div class="card">
      <h2>Retrain Log</h2>
      <div id="retrainDetails"></div>
      <div class="actions">
        <button class="btn-sm btn-warn" id="triggerRetrain">⟳ Trigger Retrain</button>
      </div>
    </div>
  </section>

  <section class="grid-3">
    <div class="card">
      <h2>ML Models</h2>
      <div id="modelDetails"></div>
    </div>
    <div class="card">
      <h2>Scheduler</h2>
      <div id="schedulerDetails"></div>
    </div>
    <div class="card">
      <h2>Drift Detection</h2>
      <div id="driftDetails"></div>
    </div>
  </section>

  <section class="card">
    <h2>Recent Timeline</h2>
  <section class="grid">
    <div class="card">
      <h3>Latest Manual vs MLOps Auto</h3>
      <div id="mlopsCompare" class="small muted">Loading...</div>
    </div>
  </section>

    <div id="timeline" style="max-height:300px;overflow-y:auto"></div>
  </section>
</div>

<script>
const $=id=>document.getElementById(id);
let JWT='';
let autoTimer=null;

function badge(text,type){return '<span class="badge badge-'+type+'">'+text+'</span>'}
function statusBadge(s){
  if(!s)return badge('unknown','warn');
  const l=s.toLowerCase();
  if(l==='success'||l==='healthy'||l==='ok'||l==='promoted')return badge(s,'ok');
  if(l==='rejected')return badge(s,'bad');
  if(l==='running'||l==='started')return badge(s,'accent');
  if(l==='warning'||l==='degraded')return badge(s,'warn');
  return badge(s,'bad');
}
function statusClass(s){
  if(!s)return 'warn';
  const l=s.toLowerCase();
  if(l==='success'||l==='healthy'||l==='ok')return 'ok';
  if(l==='running')return 'accent';
  if(l.includes('warn')||l==='degraded')return 'warn';
  return 'bad';
}
function row(label,val){return '<div class="row"><span class="muted">'+label+'</span><strong>'+(val??'—')+'</strong></div>'}
function fmtTime(t){if(!t)return '—';try{return new Date(t).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})}catch(e){return t}}
function fmtSec(v){return v==null?'—':Number(v).toFixed(1)+'s'}

async function doLogin(){
  const r=await fetch('/api/v1/auth/login-json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('user').value,password:$('pass').value})});
  if(!r.ok){const e=await r.json();throw new Error(e.detail||'Login failed')}
  const d=await r.json();
  JWT=d.access_token;
}

async function api(url){
  const r=await fetch(url,{headers:{'Authorization':'Bearer '+JWT}});
  const d=await r.json();
  if(!r.ok)throw new Error(d.detail||'Error '+r.status);
  return d;
}

async function apiPost(url){
  const r=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+JWT,'Content-Type':'application/json'}});
  return r.json();
}

function setError(m){const b=$('errorBox');b.style.display=m?'block':'none';b.textContent=m||''}

async function loadSnapshot(){
  const snap=await api('/api/v1/admin/snapshot');
  const d=snap.data,r=snap.retrain_log_summary,m=snap.model,dr=snap.drift,sc=snap.scheduler;

  const hRes=await fetch('/health').then(x=>x.json()).catch(()=>({status:'error'}));
  $('health').textContent=hRes.status||'error';
  $('health').className='value '+statusClass(hRes.status);
  $('healthSub').textContent='v'+(hRes.version||'?');

  $('refreshStatus').innerHTML=statusBadge(d.last_refresh_status);
  $('refreshSub').innerHTML=fmtTime(d.last_refresh_at)+(d.last_refresh_duration_sec!=null?' · '+fmtSec(d.last_refresh_duration_sec):'')+(d.last_refresh_trigger?' · '+d.last_refresh_trigger:'');

  $('retrainStatus').innerHTML=statusBadge(r.last_status);
  $('retrainSub').innerHTML=fmtTime(r.last_run_at)+(r.last_model_version?' · '+r.last_model_version:'');

  $('driftStatus').textContent=dr.drift_detected?'DETECTED':'Clean';
  $('driftStatus').className='value '+(dr.drift_detected?'bad':'ok');
  $('driftSub').textContent=(dr.drift_score!=null?'Score: '+Number(dr.drift_score).toFixed(3):'')+(dr.drifted_features_count?' · '+dr.drifted_features_count+' features':'');

  $('refreshDetails').innerHTML=
    row('Total refreshes',d.refresh_log_total)+
    row('Successful',d.refresh_success_count)+
    row('Failed',d.refresh_failed_count)+
    row('Countries refreshed',d.countries_refreshed)+
    row('Static countries',d.static_countries)+
    row('Last trigger',d.last_refresh_trigger)+
    row('Last duration',fmtSec(d.last_refresh_duration_sec));

  $('retrainDetails').innerHTML=
    row('Total retrains',r.total)+
    row('Successful',r.success_count)+
    row('Failed',r.failed_count)+
    row('Last status',r.last_status)+
    row('Last model version',r.last_model_version)+
    row('Last run',fmtTime(r.last_run_at));

  $('modelDetails').innerHTML=
    row('Experiment',m.experiment)+
    row('Total MLflow runs',m.total_runs)+
    row('RF AUC',m.rf_cv_auc!=null?Number(m.rf_cv_auc).toFixed(4):'—')+
    row('XGB AUC',m.xgb_cv_auc!=null?Number(m.xgb_cv_auc).toFixed(4):'—')+
    row('Ensemble AUC',m.ensemble_cv_auc!=null?Number(m.ensemble_cv_auc).toFixed(4):'—')+
    row('Model version',m.model_version);

  $('schedulerDetails').innerHTML=
    row('Running',sc.running?'<span class="ok">Yes</span>':'<span class="bad">No</span>')+
    row('Enabled',sc.enabled?'Yes':'No')+
    row('Jobs',sc.jobs_count)+
    row('Next run',fmtTime(sc.next_run_at));

  $('driftDetails').innerHTML=
    row('Status',dr.status)+
    row('Drift detected',dr.drift_detected?'<span class="bad">Yes</span>':'<span class="ok">No</span>')+
    row('Drift score',dr.drift_score!=null?Number(dr.drift_score).toFixed(4):'—')+
    row('Observations',dr.observations)+
    row('Drifted features',dr.drifted_features_count??'0');
}

async function loadTimeline(){
  try{
    const tl=await api('/api/v1/admin/timeline?hours=48');
renderMlopsComparison(tl.events || []);

    const events=tl.events||tl||[];
    const c=$('timeline');
    if(!events.length){c.innerHTML='<div class="muted" style="padding:12px">No events in the last 48 hours</div>';return}
    c.innerHTML=events.slice(0,30).map(e=>{
      let line='<div class="timeline-item"><span class="timeline-time">'+fmtTime(e.timestamp||e.started_at)+'</span> '+
        statusBadge(e.status)+' <strong>'+(e.type||e.job_name||'event')+'</strong>'+
        (e.trigger_source?' <span class="muted">via '+e.trigger_source+'</span>':'')+
        (e.message?' — <span class="muted">'+e.message+'</span>':'');
      if(e.metrics){
        const m=e.metrics;
        if(m.old_auc!=null&&m.new_auc!=null){
          const arrow=m.new_auc>=m.old_auc?'↑':'↓';
          const cls=m.new_auc>=m.old_auc?'ok':'bad';
          line+=' <span class="badge badge-'+cls+'">AUC '+Number(m.old_auc).toFixed(3)+'→'+Number(m.new_auc).toFixed(3)+' '+arrow+'</span>';
        }
        if(m.auc!=null) line+=' <span class="badge badge-ok">AUC '+Number(m.auc).toFixed(3)+'</span>';
        if(m.r2!=null) line+=' <span class="badge badge-accent">R² '+Number(m.r2).toFixed(3)+'</span>';
        if(m.rmse!=null) line+=' <span class="badge badge-warn">RMSE '+Number(m.rmse).toFixed(2)+'</span>';
      }
      if(e.duration_sec!=null) line+=' <span class="muted">'+Number(e.duration_sec).toFixed(1)+'s</span>';

      const decision = e.decision || e.promotion_decision || e.status_decision || e.metrics?.decision;
      const oldAuc = toNum(e.old_auc ?? e.metrics?.old_auc);
      const newAuc = toNum(e.new_auc ?? e.metrics?.new_auc);

      if (decision === 'promoted') {
        line += ' <span class="badge badge-ok">promoted</span>';
      } else if (decision === 'rejected') {
        line += ' <span class="badge badge-fail">rejected</span>';
      }

      if (oldAuc != null && newAuc != null) {
        const diff = newAuc - oldAuc;
        const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '=';
        const cls = diff > 0 ? 'ok' : diff < 0 ? 'fail' : 'accent';
        line += ' <span class="badge badge-' + cls + '">AUC ' + oldAuc.toFixed(3) + '→' + newAuc.toFixed(3) + ' ' + arrow + '</span>';
      }
      line+='</div>';
      return line;
    }).join('');
    }catch(e){console.error('loadTimeline failed', e); $('timeline').innerHTML='<div class="muted" style="padding:12px">Timeline unavailable</div>'}
}

async function load(){
  setError('');
  $('loadBtn').disabled=true;
  $('loadBtn').innerHTML='<span class="spinner"></span>Loading…';
  try{
    await doLogin();
    await Promise.all([loadSnapshot(),loadTimeline()]);
    $('lastUpdate').textContent='Last updated: '+new Date().toLocaleTimeString('ru-RU');
  }catch(e){setError(e.message)}
  finally{$('loadBtn').disabled=false;$('loadBtn').textContent='Load'}
}

$('loadBtn').addEventListener('click',load);

$('autoBtn').addEventListener('click',function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.textContent='Auto-refresh: OFF';this.className='btn-sm'}
  else{autoTimer=setInterval(load,15000);this.textContent='Auto-refresh: ON';this.className='btn-sm btn-ok';load()}
});

$('triggerRefresh').addEventListener('click',async function(){
  if(!confirm('Trigger data refresh via AI Control Layer?'))return;
  this.disabled=true;
  try{if(!JWT)await doLogin();const r=await apiPost('/api/v1/admin/ai/refresh');alert('Refresh: '+(r.status||JSON.stringify(r)));load()}
  catch(e){alert('Error: '+e.message)}
  finally{this.disabled=false}
});

$('triggerRetrain').addEventListener('click',async function(){
  if(!confirm('Trigger model retrain via AI Control Layer?'))return;
  this.disabled=true;
  try{if(!JWT)await doLogin();const r=await apiPost('/api/v1/admin/ai/retrain');alert('Retrain: '+(r.status||JSON.stringify(r)));load()}
  catch(e){alert('Error: '+e.message)}
  finally{this.disabled=false}
});

load();

function pickMetric(m, ...keys){
  if(!m) return null;
  for(const k of keys){
    const v = m[k];
    
  }
  return null;
}
function toNum(v){
  if (v == null) return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function fmtDelta(v){
  if (v == null) return 'n/a';
  const n = Number(v);
  if (!Number.isFinite(n)) return 'n/a';
  return (n > 0 ? '+' : '') + n.toFixed(3);
}
function renderMlopsComparison(events){
  const el = document.getElementById('mlopsCompare');
  if(!el) return;
  const retrains = (events || []).filter(e => e && e.type === 'retrain' && e.status === 'success');
  const latestManual = retrains.find(e => e.trigger_source === 'manual');
  const latestMlops = retrains.find(e => e.trigger_source === 'mlops_auto');
  if(!latestManual || !latestMlops){
    el.innerHTML = '<span class="muted">Need at least one successful manual and one successful mlops_auto retrain</span>';
    return;
  }
  const manualAuc = pickMetric(latestManual.metrics, 'roc_auc', 'auc', 'train_auc', 'ensemble_cv_auc');
  const mlopsAuc = pickMetric(latestMlops.metrics, 'roc_auc', 'auc', 'train_auc', 'ensemble_cv_auc');
  const manualAcc = pickMetric(latestManual.metrics, 'accuracy', 'train_accuracy');
  const mlopsAcc = pickMetric(latestMlops.metrics, 'accuracy', 'train_accuracy');
  const manualF1 = pickMetric(latestManual.metrics, 'f1_score', 'train_f1', 'best_f1');
  const mlopsF1 = pickMetric(latestMlops.metrics, 'f1_score', 'train_f1', 'best_f1');
  const aucDelta = (mlopsAuc != null && manualAuc != null) ? (mlopsAuc - manualAuc) : null;
  const accDelta = (mlopsAcc != null && manualAcc != null) ? (mlopsAcc - manualAcc) : null;
  const f1Delta  = (mlopsF1 != null && manualF1 != null) ? (mlopsF1 - manualF1) : null;
  const aucArrow = aucDelta == null ? '' : (aucDelta > 0 ? '↑' : (aucDelta < 0 ? '↓' : '→'));
  const accArrow = accDelta == null ? '' : (accDelta > 0 ? '↑' : (accDelta < 0 ? '↓' : '→'));
  const f1Arrow  = f1Delta == null ? '' : (f1Delta > 0 ? '↑' : (f1Delta < 0 ? '↓' : '→'));
  el.innerHTML = `
    <div><strong>Manual:</strong> ${latestManual.timestamp || 'n/a'} · model ${latestManual.model_version || 'n/a'}</div>
      <div><strong>MLOps:</strong> ${latestMlops.timestamp || 'n/a'} · model ${latestMlops.model_version || 'n/a'}</div>
    <div style="margin-top:8px">
      <span class="badge">AUC ${manualAuc?.toFixed?.(4) ?? 'n/a'} → ${mlopsAuc?.toFixed?.(4) ?? 'n/a'} ${aucArrow} (${fmtDelta(aucDelta)})</span>
      <span class="badge">ACC ${manualAcc?.toFixed?.(4) ?? 'n/a'} → ${mlopsAcc?.toFixed?.(4) ?? 'n/a'} ${accArrow} (${fmtDelta(accDelta)})</span>
      <span class="badge">F1 ${manualF1?.toFixed?.(4) ?? 'n/a'} → ${mlopsF1?.toFixed?.(4) ?? 'n/a'} ${f1Arrow} (${fmtDelta(f1Delta)})</span>
    </div>
  `;
}


async function triggerFullPipeline() {
  const btn = document.getElementById('btnFullPipeline');
  btn.disabled = true; btn.textContent = '⏳ Running...';
  try {
    const res = await fetch('/api/v1/mlops/full-pipeline', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Full pipeline: ' + (data.decision || data.status || 'done'), 'success');
    } else {
      showToast('Pipeline error: ' + (data.detail || res.status), 'error');
    }
  } catch (e) { showToast('Pipeline failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⚡ Full Pipeline'; loadTimeline(); loadSnapshot(); }
}
</script>
</body>
</html>
