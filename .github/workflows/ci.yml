name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint (non-blocking)
        run: |
          pip install flake8
          flake8 app/ --max-line-length=150 --ignore=E501,W503,E402,F401,F841 --exit-zero

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Rsync code to server
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30" \
            --exclude '.git/' \
            --exclude 'venv/' \
            --exclude 'mlruns/' \
            --exclude 'data/' \
            --exclude '.env' \
            --exclude 'backups/' \
            --exclude '__pycache__/' \
            --exclude 'node_modules/' \
            --exclude '.pytest_cache/' \
            --exclude '*.pyc' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/sora_earth/

      - name: Restart services and healthcheck
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash <<'EOF'
            set -e
            cd /opt/sora_earth
            docker compose up -d --build
            sleep 15
            if curl -fsS http://localhost/api/v1/health > /dev/null 2>&1; then
              echo "✅ Healthcheck passed"
              [ -x /root/scripts/notify_telegram.sh ] && /root/scripts/notify_telegram.sh "🚀" "SORA deploy done"
            else
              echo "❌ Healthcheck failed"
              [ -x /root/scripts/notify_telegram.sh ] && /root/scripts/notify_telegram.sh "❌" "SORA deploy FAILED"
              exit 1
            fi
          EOF
